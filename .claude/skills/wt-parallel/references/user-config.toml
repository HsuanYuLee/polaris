[commit]
stage = "all"

[commit.generation]
# Uses Claude Haiku in pipe mode to generate commit messages.
# Flags: --tools='' disables tool use, --setting-sources='' / --system-prompt=''
# prevent loading project settings/prompts so it runs as a fast, isolated text generator.
command = "MAX_THINKING_TOKENS=0 claude -p --model=haiku --tools='' --disable-slash-commands --setting-sources='' --system-prompt=''"

[merge]
squash = true
commit = true
rebase = true
remove = true
verify = true
